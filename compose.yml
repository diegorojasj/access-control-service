x-postgres-env: &postgres-env
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_HOST: ${POSTGRES_HOST:-localhost}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}

services:
  init-dirs:
    image: busybox
    command: sh -c "mkdir -p /mnt/postgres/data && tail -f /dev/null"
    volumes:
      - .:/mnt
    restart: "no"

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      <<: *postgres-env
    ports:
      - "5432:5432"
    volumes:
      - type: bind
        source: ./postgres/data
        target: /var/lib/postgresql/data
        bind:
          selinux: z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      - init-dirs

  init-db:
    build:
      context: .
      dockerfile: containers/containerfiles/backend.containerfile
    command: python seed.py
    volumes:
      - ./backend:/app:z
      - ./postgres/default_data:/scripts:z
    environment:
      <<: *postgres-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: containers/containerfiles/backend.containerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app:z
      - ./backend/requirements.default:/app/requirements.txt:z
    environment:
      <<: *postgres-env
      HOST: ${HOST:-localhost}
      PORT: ${PORT:-8000}
      EXPIRES_IN: ${EXPIRES_IN:-10800}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RELOAD: ${RELOAD:-false}
      WORKERS: ${WORKERS:-1}
      ACCESS_LOG: ${ACCESS_LOG:-true}
      LIFESPAN: ${LIFESPAN:-auto}
      HTTP: ${HTTP:-h11}
      WS: ${WS:-auto}
      PROXY_HEADERS: ${PROXY_HEADERS:-true}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-*}
      LIMIT_MAX_REQUESTS: ${LIMIT_MAX_REQUESTS:-}
    depends_on:
      postgres:
        condition: service_healthy
  web:
    build:
      context: .
      dockerfile: containers/containerfiles/frontend.containerfile
    profiles: ["PROD"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot/www:/var/www/certbot:z
      - ./certbot/conf:/etc/letsencrypt:ro,z
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      DOMAIN: ${DOMAIN}
    depends_on:
      - backend

  certbot:
    image: certbot/certbot
    profiles: ["PROD"]
    volumes:
      - ./certbot/www:/var/www/certbot:z
      - ./certbot/conf:/etc/letsencrypt:z
    environment:
      DOMAIN: ${DOMAIN}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL}
    entrypoint: >
      /bin/sh -c '
        if [ ! -f /etc/letsencrypt/live/$$DOMAIN/fullchain.pem ]; then
          echo "Issuing certificate for $$DOMAIN...";
          certbot certonly --webroot --webroot-path=/var/www/certbot
            --non-interactive --agree-tos --no-eff-email
            -m $$CERTBOT_EMAIL -d $$DOMAIN;
        fi;
        trap exit TERM;
        while :; do
          certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done
      '
    depends_on:
      - web