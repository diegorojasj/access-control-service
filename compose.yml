x-postgres-env: &postgres-env
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_HOST: ${POSTGRES_HOST:-localhost}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}

services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      <<: *postgres-env
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  init-db:
    image: postgres:15
    environment:
      <<: *postgres-env
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres/default_data:/scripts:Z
    command: >
      bash -c "
        psql -h ${POSTGRES_HOST:-postgres} -p ${POSTGRES_PORT:-5432} -U ${POSTGRES_USER} -d ${POSTGRES_DB} -f /scripts/roles.sql &&
        psql -h ${POSTGRES_HOST:-postgres} -p ${POSTGRES_PORT:-5432} -U ${POSTGRES_USER} -d ${POSTGRES_DB} -f /scripts/permissions.sql &&
        psql -h ${POSTGRES_HOST:-postgres} -p ${POSTGRES_PORT:-5432} -U ${POSTGRES_USER} -d ${POSTGRES_DB} -f /scripts/users.sql
      "
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: podman/containerfiles/backend.containerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app:z
      - ./backend/requirements.default:/app/requirements.txt:z
    environment:
      <<: *postgres-env
      HOST: ${HOST:-localhost}
      PORT: ${PORT:-8000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RELOAD: ${RELOAD:-false}
      WORKERS: ${WORKERS:-1}
      ACCESS_LOG: ${ACCESS_LOG:-true}
      LIFESPAN: ${LIFESPAN:-auto}
      HTTP: ${HTTP:-h11}
      WS: ${WS:-auto}
      PROXY_HEADERS: ${PROXY_HEADERS:-true}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-*}
      LIMIT_MAX_REQUESTS: ${LIMIT_MAX_REQUESTS:-}
    depends_on:
      init-db:
        condition: service_completed_successfully
  web:
    build:
      context: .
      dockerfile: podman/containerfiles/web.containerfile
    profiles: ["PROD"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      BUN_PUBLIC_API_BASE_URL: ${BUN_PUBLIC_API_BASE_URL:-http://localhost:8000}
      BUN_PUBLIC_ENCRYPTION_SECRET: ${BUN_PUBLIC_ENCRYPTION_SECRET:-J0£\=i9=XHT{i&v9njwRj~Oo3kzy0Hk[77Jwz7N+ms1KOJ^/e;}
    depends_on:
      - backend