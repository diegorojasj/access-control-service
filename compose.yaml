x-postgres-env: &postgres-env
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_HOST: ${POSTGRES_HOST:-localhost}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}

services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      <<: *postgres-env
    ports:
      - "5432:5432"
    volumes:
      - postgres/data:/var/lib/postgresql/data
  backend:
    build:
      context: .
      dockerfile: podman/containerfiles/backend.containerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app:z
      - ./backend/requirements.default:/app/requirements.txt:z
    environment:
      <<: *postgres-env
      HOST: ${HOST:-localhost}
      PORT: ${PORT:-8000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RELOAD: ${RELOAD:-false}
      WORKERS: ${WORKERS:-4}
      ACCESS_LOG: ${ACCESS_LOG:-true}
      LIFESPAN: ${LIFESPAN:-auto}
      HTTP: ${HTTP:-h11}
      WS: ${WS:-auto}
      PROXY_HEADERS: ${PROXY_HEADERS:-true}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-*}
      LIMIT_MAX_REQUESTS: ${LIMIT_MAX_REQUESTS:-}
    depends_on:
      - postgres
  web:
    build:
      context: .
      dockerfile: podman/containerfiles/web.containerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: