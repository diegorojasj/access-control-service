x-postgres-env: &postgres-env
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB}

services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      <<: *postgres-env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend:
    build:
      context: .
      dockerfile: podman/containerfiles/backend-dev
    command:
      - sh
      - -c
      - |
        set -e
        ARGS="--host ${HOST:-0.0.0.0} --port ${PORT:-8000} --log-level ${LOG_LEVEL:-info}"
        if [ "${RELOAD:-false}" = "true" ]; then ARGS="$ARGS --reload"; fi
        if [ -n "${WORKERS}" ] && [ "${WORKERS}" != "1" ]; then ARGS="$ARGS --workers ${WORKERS}"; fi
        exec uvicorn main:app $ARGS
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app:z
      - ./backend/requirements.default:/app/requirements.txt:z
    environment:
      <<: *postgres-env
    depends_on:
      - postgres

volumes:
  postgres_data: